# See: https://docs.atuin.sh/cli/configuration/config

dialect = "us"
auto_sync = false
update_check = false
sync_address = ""

search_mode = "fuzzy"
filter_mode = "global"
enter_accept = true
workspaces = true
style = "auto"
exit_mode = "return-original"
history_format = "{time}\t{duration}\t{directory}\t{command}"
keymap_mode = "vim-normal"
local_timeout = 5

common_prefix = [
  "sudo",
  "clear"
]

[theme]
name = "anosh"
